<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="title" content="baboya" />
    <meta
      name="description"
      content="I learned how to code so I could make cool stuff on Ethereum."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://baboya.eth.limo" />
    <meta property="og:title" content="baboya" />
    <meta
      property="og:description"
      content="I learned how to code so I could make cool stuff on Ethereum."
    />
    <meta
      property="og:image"
      content="https://baboya.eth.limo/assets/img/apple-touch-icon.png"
    />
    <title>baboya</title>
    <link rel="preload" as="image" href="./assets/img/ooman.png" />
    <link rel="preload" as="image" href="./assets/img/blocks.png" />
    <link rel="preload" as="image" href="./assets/img/pool.png" />
    <link rel="preload" as="image" href="./assets/img/rocket.png" />
    <link rel="preload" as="image" href="./assets/img/dappkit.png" />
    <link rel="preload" as="image" href="./assets/img/rainbow.png" />
    <link rel="preload" as="image" href="./assets/img/connect.png" />
    <link rel="icon" type="image/x-icon" href="./assets/img/favicon.ico" />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="./assets/img/apple-touch-icon.png"
    />
    <link
      rel="alternate"
      type="application/rss+xml"
      title="baboya"
      href="https://baboya.eth.limo/rss.xml"
    />
    <script>
      (() => {
        const m = localStorage.themeMode;
        const t =
          m === "light" || m === "dark"
            ? m
            : matchMedia("(prefers-color-scheme: dark)").matches
              ? "dark"
              : "light";
        document.documentElement.dataset.theme = t;
      })();
    </script>
    <link rel="stylesheet" href="./assets/css/styles.css" />
  </head>

  <body>
    <input
      type="checkbox"
      id="menu-toggle"
      class="menu-toggle"
      aria-label="Menu"
    />
    <div class="wrapper">
      <header>
        <a href="#home" data-page="home" class="logo">
          <h1>BABOYA</h1>
        </a>

        <div class="header-right">
          <nav>
            <div class="link">
              <a href="#work" data-page="work">work</a>
              <a href="#about" data-page="about">about</a>
            </div>
          </nav>
          <button id="theme-btn" aria-label="Toggle theme">
            <svg
              id="theme-light"
              xmlns="http://www.w3.org/2000/svg"
              width="20"
              height="20"
              viewBox="0 0 16 16"
              fill="none"
              stroke="currentColor"
              stroke-width="1.33"
            >
              <circle cx="8" cy="8" r="3.33" />
              <path
                d="M8 0.67v1.33M8 14v1.33M2.81 2.81l0.95 0.95M12.24 12.24l0.95 0.95M0.67 8h1.33M14 8h1.33M2.81 13.19l0.95-0.95M12.24 3.76l0.95-0.95"
              />
            </svg>
            <svg
              id="theme-dark"
              xmlns="http://www.w3.org/2000/svg"
              width="20"
              height="20"
              viewBox="0 0 16 16"
              fill="none"
              stroke="currentColor"
              stroke-width="1.33"
            >
              <path d="M14 8.53A6 6 0 1 1 7.47 2 4.67 4.67 0 0 0 14 8.53z" />
            </svg>
            <svg
              id="theme-system"
              xmlns="http://www.w3.org/2000/svg"
              width="20"
              height="20"
              viewBox="0 0 16 16"
              fill="none"
              stroke="currentColor"
              stroke-width="1.33"
            >
              <rect
                x="1.33"
                y="2"
                width="13.33"
                height="9.33"
                rx="1.33"
                ry="1.33"
              />
              <line x1="5.33" y1="14" x2="10.67" y2="14" />
              <line x1="8" y1="11.33" x2="8" y2="14" />
            </svg>
          </button>
          <label for="menu-toggle" class="burger-menu">
            <div class="bar"></div>
            <div class="bar"></div>
          </label>
        </div>
      </header>

      <template id="home">
        <div class="home-wrapper">
          <div class="home-left">
            <div class="intro-accordion">
              <h2>about &darr;</h2>
              <input type="checkbox" id="intro-accordion" />
              <label for="intro-accordion" class="accordion-header">
                <p>
                  I learned how to code so I could make cool stuff on Ethereum.
                </p>
              </label>
              <div class="accordion-content">
                <p>
                  As a minimalist, I believe in living simply and coding simple
                  functional tools with no unnecessary complexity.
                </p>
                <p>
                  Let's do things with purpose and integrity. Money is nice but
                  it's not everything...
                </p>
              </div>
            </div>
            <div class="connect">
              <h2>find me on &darr;</h2>
              <div class="social-links">
                <a href="https://github.com/b4b0y4" target="_blank"
                  ><span>GitHub:</span><span class="dot">@b4b0y4</span></a
                >
                <a href="https://x.com/b4b0y4" target="_blank"
                  ><span>Twitter:</span><span class="dot">@b4b0y4</span></a
                >
                <a href="https://farcaster.xyz/baboya.eth" target="_blank"
                  ><span>Farcaster:</span
                  ><span class="dot">@baboya.eth</span></a
                >
              </div>
            </div>
            <div class="pointer-to-projects">
              <h2>
                some things I made
                <span class="desktop-arrow">&rarr;</span>
                <span class="mobile-arrow">&darr;</span>
              </h2>
            </div>
          </div>
          <div class="card-box"></div>
        </div>
      </template>

      <template id="work">
        <div class="work-wrapper">
          <div class="work-intro">
            <h2>all the things I made</h2>
          </div>
          <div class="card-box work-cards"></div>
        </div>
      </template>

      <template id="about">
        <div id="about-wrapper">
          <div class="about-title">
            <h2>about me</h2>
          </div>
          <div class="about-intro">
            <p>
              I studied science some time ago, then spent 10+ years traveling
              the world. Eventually got into coding because I wanted to build
              stuff on Ethereum, mainly because cutting out middlemen just makes
              sense.
            </p>
            <p>
              These days I'm building little tools to interact with the
              blockchain. Art blocks live script generator, staking interfaces,
              vault tools, that kind of thing. Nothing fancy, just functional
              apps that do what they need to do.
            </p>
            <p>
              I keep everything vanilla, no frameworks, no build tools unless
              absolutely necessary. Just HTML, CSS, and JavaScript, pushed to
              IPFS. Simpler to maintain, easier to understand, and honestly more
              fun to work with.
            </p>
            <p>
              ChatGPT came out a few months after I started learning, which
              basically saved me from drowning in Stack Overflow. Still learning
              every day and would love to make coding my main thing eventually.
            </p>
            <p>
              My approach? No fluff, no unnecessary complexity, just things that
              work and hopefully help people out.
            </p>
            <p>
              Still traveling around whenever I can. Outside of coding, you'll
              find me cooking, watching movies and chilling with friends and
              family.
            </p>
          </div>
        </div>
      </template>

      <main></main>

      <footer>
        <p>[2021-<span id="year"></span>] baboya</p>
        <div class="footer-social">
          <a
            href="https://github.com/b4b0y4"
            aria-label="GitHub"
            target="_blank"
          >
            <svg class="icon">
              <use href="./assets/img/icons.svg#github"></use>
            </svg>
          </a>
          <a
            href="https://twitter.com/b4b0y4"
            aria-label="twitter"
            target="_blank"
          >
            <svg class="icon">
              <use href="./assets/img/icons.svg#twitter"></use>
            </svg>
          </a>
          <a
            href="https://farcaster.xyz/baboya.eth"
            aria-label="farcaster"
            target="_blank"
          >
            <svg class="icon">
              <use href="./assets/img/icons.svg#farcaster"></use>
            </svg>
          </a>
          <a href="/rss.xml" aria-label="rss" target="_blank">
            <svg class="icon">
              <use href="./assets/img/icons.svg#rss"></use>
            </svg>
          </a>
        </div>
      </footer>
    </div>

    <script>
      const cards = [
        {
          href: "https://ooman.wei.limo",
          title: "ooman",
          teaser:
            "Browse, download, and claim cute pixel characters. *100% onchain SVGs*",
        },
        {
          href: "https://blocks.baboya.eth.limo/",
          title: "blocks",
          teaser:
            "Generate live scripts for any Art Blocks (+Engine) collections.",
        },
        {
          href: "https://pool.baboya.eth.limo",
          title: "pool",
          teaser:
            "A lightweight multi-chain interface for PoolTogether V5 WETH vaults.",
        },
        {
          href: "https://rocket.baboya.eth.limo",
          title: "rocket",
          teaser:
            "A minimal web interface for staking and unstaking ETH with Rocket Pool.",
          workOnly: true,
        },
        {
          href: "https://b4b0y4.github.io/dappkit/",
          title: "dappkit",
          teaser:
            "A minimal dependency starter template for decentralized applications.",
          workOnly: true,
        },
        {
          href: "https://b4b0y4.github.io/claimMarket/",
          title: "rainbow",
          teaser:
            "A web app to claim and exchange onchain SVG on Sepolia testnet.",
          workOnly: true,
        },
        {
          href: "https://b4b0y4.github.io/connect/",
          title: "connect",
          teaser:
            "A simple JavaScript connectivity component with EIP-6963 support.",
          workOnly: true,
        },
        {
          href: "https://b4b0y4.github.io/fundMe/",
          title: "fundme",
          teaser: "My front end for the fund me lesson from @PatrickAlphaC.",
          workOnly: true,
        },
      ];
      const cardHTML = ({ href, title, teaser }) => `
      <a href="${href}" target="_blank" class="card-link">
        <div class="card">
          <div class="card-text">
            <h3>${title}</h3>
            <p class="card-teaser">${teaser}</p>
          </div>
          <img src="./assets/img/${title}.png" alt="${title} screenshot" />
        </div>
      </a>`;
      const header = document.querySelector("header"),
        nav = document.querySelector("nav"),
        main = document.querySelector("main"),
        menuToggle = document.getElementById("menu-toggle");
      (() => {
        const order = ["system", "light", "dark"];
        const mq = matchMedia("(prefers-color-scheme: dark)");
        const apply = () => {
          const m = localStorage.themeMode || "system";
          const t = m === "system" ? (mq.matches ? "dark" : "light") : m;
          Object.assign(document.documentElement.dataset, {
            theme: t,
            themeSource: m,
          });
        };
        const cycle = () => {
          const m = localStorage.themeMode || "system";
          localStorage.themeMode = order[(order.indexOf(m) + 1) % 3];
          apply();
        };
        document.addEventListener("DOMContentLoaded", () => {
          const btn = document.getElementById("theme-btn");
          if (btn) btn.onclick = cycle;
          mq.addEventListener(
            "change",
            () => (localStorage.themeMode || "system") === "system" && apply(),
          );
          apply();
        });
      })();
      let lastScroll = window.scrollY || 0;
      const loadPage = (page = location.hash.slice(1) || "home") => {
        const id = page.replace(/\//g, "-");
        const template = document.getElementById(id);
        if (!template) {
          location.hash = "home";
          return;
        }
        main.innerHTML = "";
        main.appendChild(template.content.cloneNode(true));
        const box = main.querySelector(".card-box");
        if (box) {
          const isWork = page === "work";
          box.innerHTML = cards
            .filter((c) => isWork || !c.workOnly)
            .map(cardHTML)
            .join("");
        }
        document
          .querySelectorAll("nav .link a")
          .forEach((a) => a.classList.toggle("active", a.hash === `#${page}`));
        scrollTo(0, 0);
      };
      addEventListener(
        "scroll",
        () => {
          header.classList.toggle(
            "hide",
            scrollY > lastScroll && scrollY > 100,
          );
          lastScroll = scrollY;
        },
        { passive: true },
      );
      addEventListener("hashchange", () => {
        loadPage(location.hash.slice(1));
        menuToggle.checked = false;
      });
      nav.addEventListener(
        "click",
        (e) => e.target.closest("a") && (menuToggle.checked = false),
      );
      loadPage();
      document.getElementById("year").textContent = new Date().getFullYear();
    </script>
  </body>
</html>
